// EXPO_TV=1 gate: Android TV builds must not pull libmpv (Phase C vendors
// an arm64/x86_64 phone binary only). Declare the bare plugins so Gradle
// can resolve the project path, then skip native configuration entirely.
// The androidtv CI prebuild dry-run relies on this early-return.
if (System.getenv("EXPO_TV") == "1") {
  apply plugin: "com.android.library"
  apply plugin: "kotlin-android"

  android {
    namespace "com.margelo.nitro.nativempv"
    compileSdkVersion rootProject.ext.has("compileSdkVersion") ? rootProject.ext.get("compileSdkVersion") : 35
    defaultConfig {
      minSdkVersion rootProject.ext.has("minSdkVersion") ? rootProject.ext.get("minSdkVersion") : 24
    }
  }

  return
}

buildscript {
  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["NativeMpv_" + name]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply from: '../nitrogen/generated/android/NativeMpv+autolinking.gradle'

apply plugin: "com.facebook.react"

// Fetch libmpv-android before the CMake configure step. Mirrors the
// iOS flow where `fetch-mpvkit.sh` runs as part of `pod install`.
// Skipped if the vendor dir already has the expected `.complete` marker
// so normal rebuilds don't re-hit 1Password.
def mpvVendorDir = file("${projectDir}/../vendor/android")
def mpvCompleteMarker = file("${mpvVendorDir}/.complete")
def fetchLibmpv = tasks.register("fetchLibmpvAndroid", Exec) {
  group = "libmpv"
  description = "Populate vendor/android with libmpv.so + headers from 1Password"
  workingDir = projectDir
  commandLine "bash", "${projectDir}/../scripts/fetch-libmpv-android.sh"
  outputs.file(mpvCompleteMarker)
  onlyIf { !mpvCompleteMarker.exists() }
}
afterEvaluate {
  tasks.matching { it.name.startsWith("configureCMake") }.configureEach {
    dependsOn fetchLibmpv
  }
  // jniLibs.srcDirs reads from vendor/android too, so merge tasks also
  // need the fetch to run first. Gradle 9 validates this explicitly.
  tasks.matching { it.name.startsWith("merge") && it.name.endsWith("JniLibFolders") }.configureEach {
    dependsOn fetchLibmpv
  }
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["NativeMpv_" + name]).toInteger()
}

android {
  namespace "com.margelo.nitro.nativempv"

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters(*reactNativeArchitectures())

        buildTypes {
          debug {
            cppFlags "-O1 -g"
          }
          release {
            cppFlags "-O2"
          }
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  // Pack the vendored libmpv.so into the AAR. Per-ABI layout at
  // modules/native-mpv/vendor/android/<abi>/libmpv.so is exactly what
  // the Android build system expects from a jniLibs source set.
  sourceSets {
    main {
      jniLibs.srcDirs = ["${projectDir}/../vendor/android"]
    }
  }

  packagingOptions {
    excludes = [
      "META-INF",
      "META-INF/**",
      "**/libc++_shared.so",
      "**/libfbjni.so",
      "**/libjsi.so",
      "**/libfolly_json.so",
      "**/libfolly_runtime.so",
      "**/libglog.so",
      "**/libhermes.so",
      "**/libhermes-executor-debug.so",
      "**/libhermes_executor.so",
      "**/libreactnative.so",
      "**/libreactnativejni.so",
      "**/libturbomodulejsijni.so",
      "**/libreact_nativemodule_core.so",
      "**/libjscexecutor.so",
    ]
    // libmpv.so is unstripped in the vendored tarball (mpv-android's
    // buildall.sh keeps symbols for debuggability). Don't strip at APK
    // time, and dedup when a secondary module also happens to see it.
    jniLibs {
      keepDebugSymbols += ["*/libmpv.so"]
      pickFirsts += ["**/libmpv.so"]
    }
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  mavenCentral()
  google()
}

def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
  implementation project(":react-native-nitro-modules")
}
