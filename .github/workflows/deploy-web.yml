name: Deploy web

# Builds apps/web/dist on every push to main that touches the marketing
# site or the shared theme, then publishes the static export to the
# gh-pages branch via peaceiris/actions-gh-pages.
#
# Why a branch deploy and not Pages-via-Actions? The legacy Jekyll
# privacy site lives under docs/ on main and serves
# https://overglass.github.io/jellyfuse/privacy.html. GitHub Pages sources
# from a single branch — switching the source to "Actions" would orphan
# that URL. The branch-deploy approach keeps Jekyll serving /docs from
# main while the marketing site overlays the rest of the project.
#
# IMPORTANT: when you flip the GitHub Pages source to `gh-pages` (branch
# / `(root)`), copy `docs/privacy.md` into the gh-pages publish so the
# privacy URL keeps resolving — this workflow's `Preserve docs/` step
# handles that.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/theme/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter @jellyfuse/web typecheck

      - name: Lint
        run: bun run --filter @jellyfuse/web lint

      - name: Build static export
        run: bun run --filter @jellyfuse/web build:web

      # Carry the existing Jekyll privacy + legal pages over so
      # https://overglass.github.io/jellyfuse/privacy.html keeps working
      # after Pages source flips to gh-pages.
      - name: Preserve docs/
        run: |
          mkdir -p apps/web/dist/legal
          cp docs/privacy.md apps/web/dist/legal/privacy.md
          # Render privacy.md to a flat HTML page so the URL keeps working
          # even if Pages is no longer configured for Jekyll.
          {
            echo '<!doctype html>'
            echo '<html lang="en"><head>'
            echo '<meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
            echo '<title>Jellyfuse — Privacy Policy</title>'
            echo '<link rel="icon" href="favicon.png">'
            echo '<style>body{margin:0;padding:48px 24px;background:#1e2227;color:#d7dae0;font:16px/1.6 -apple-system,system-ui,sans-serif;max-width:720px;margin-inline:auto;}h1,h2,h3{color:#fff;letter-spacing:-0.02em;}a{color:#61afef;}</style>'
            echo '</head><body><main>'
            cat docs/privacy.md
            echo '</main></body></html>'
          } > apps/web/dist/privacy.html

      - name: Add SPA 404 fallback
        run: |
          if [ ! -f apps/web/dist/404.html ]; then
            cp apps/web/dist/index.html apps/web/dist/404.html
          fi

      - name: Touch .nojekyll
        run: touch apps/web/dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy(web): ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
